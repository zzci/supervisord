---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Verify gofmt
        run: |
          diff -u <(echo -n) <(gofmt -l .)

      - name: go vet
        run: go vet ./...

      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run ./...

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          repo-checkout: false

      - name: gosec
        uses: securego/gosec@master
        with:
          # HIGH and MEDIUM findings fail the gate. Design-level positives
          # (self-exec daemonize, INI-parser file reads, MD5 file-change
          # comparison, etc.) carry `// #nosec Gxxx -- reason` annotations
          # so they don't trip the gate. LOW findings (G104 unhandled
          # errors, mostly defer Close patterns) are reported but don't
          # block; they're tracked for opportunistic cleanup.
          args: -quiet -severity medium ./...

      - name: go mod tidy clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test (race + cover)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build supervisord
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -extldflags -static" \
            -o dist/supervisord-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/supervisord

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run e2e suite
        run: go test -tags e2e -count=1 -timeout 5m -v ./tests/e2e/...

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: zzci/supervisord:ci
